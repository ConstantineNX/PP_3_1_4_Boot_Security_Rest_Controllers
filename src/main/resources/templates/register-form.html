<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/update-form.css}">
</head>
<body>
<div class="user-form">
    <h2>Регистрация</h2>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <div th:if="${error!=null}" style="color: red; margin-bottom: 15px;">
            <span th:text="${error}"></span>
        </div>
        <div class="form-group">
            <label>Имя:</label>
            <input type="text" th:field="${user.firstName}" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="${user.email}" required>
        </div>
        <div class="form-group">
            <label>Пароль:</label>
            <input type="password" th:field="${user.password}" required>
        </div>
        <div class="form-actions">
            <button type="submit">Зарегистрироваться</button>
        </div>
    </form>
    <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль</title>
    <link rel="stylesheet" th:href="@{/css/update-form.css}" >
</head>
<body>
<div class="user-form">
    <h2>Мой профиль</h2>
    <div class="form-group">
        <label>Имя: </label>
        <p th:text="${user.firstName}">-</p>
    </div>

    <div class="form-group">
        <label>Фамилия: </label>
        <p th:text="${user.lastName}">-</p>
    </div>

    <div class="form-group">
        <label>Возраст: </label>
        <p th:text="${user.age}">-</p>
    </div>

    <div class="form-group">
        <label>Город: </label>
        <p th:text="${user.city}">-</p>
    </div>

    <div class="form-group">
        <label>Email: </label>
        <p th:text="${user.email}">-</p>
    </div>

    <div class="form-group">
        <label>Телефон: </label>
        <p th:text="${user.phone}">-</p>
    </div>

    <div class="form-group">
        <label>Дата создания: </label>
        <p th:text="${user.createdAt}">-</p>
    </div>

    <div class="form-group">
        <label>Дата обновления: </label>
        <p th:text="${user.updatedAt}">-</p>
    </div>

    <div class="form-actions">
        <form th:action="@{/user/edit}" method="get" style="display: inline;">
            <button type="submit" class="btn-edit">Редактировать профиль</button>
        </form>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn-logout">Выйти из аккаунта</button>
        </form>
    </div>
</div>
</body>
</html>

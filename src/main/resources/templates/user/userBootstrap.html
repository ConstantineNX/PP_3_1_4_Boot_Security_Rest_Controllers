<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      lang="ru">
<head>
    <th:block th:include="fragments-bootstrap :: common-head"></th:block>
    <title>User table</title>
    <link rel="stylesheet" th:href="@{/css/table-form.css}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark py-1">
    <div class="container-fluid">
        <div class="navbar-text">
            <strong th:text="${currentUser.email}">Email</strong>
            <span class="ms-2">with roles:
                <th:block th:each="role, iterStart : ${currentUser.roles}">
                    <span th:text="${role.name.replace('ROLE_', '')}"></span>
                    <span th:if="${not iterStart.last}"> </span>
                </th:block>
            </span>
        </div>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid p-0 mt-3" >
    <div class="row">
        <div class="col-2 p-0">
            <ul class="list-unstyled">
                <li class="bg-primary text-white rounded"
                    style="padding: 10px 0 10px 25px">User</li>
            </ul>
        </div>
        <div class="col-10 bg-light" style="min-height: 100vh;">
            <h1 style="padding-left: 20px">Профиль пользователя</h1>

            <div th:if="${view=='USER'}">
                <hr class="my-3">
                <table class="table table-striped table-bordered">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Фамилия</th>
                        <th>Возраст</th>
                        <th>Город</th>
                        <th>Email</th>
                        <th>Номер телефона</th>
                        <th>Дата создания</th>
                        <th>Дата обновления</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.firstName}"></td>
                        <td th:text="${user.lastName}"></td>
                        <td th:text="${user.age}"></td>
                        <td th:text="${user.city}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.phone}"></td>
                        <td th:text="${user.createdAt}"></td>
                        <td th:text="${user.updatedAt}"></td>
                        <td>
                        <button type="button" class="btn btn-sm btn-warning"
                                data-bs-toggle="modal" data-bs-target="#editUserModal"
                                th:data-user-id="${user.id}"
                                th:data-user-firstname="${user.firstName}"
                                th:data-user-lastname="${user.lastName}"
                                th:data-user-age="${user.age}"
                                th:data-user-city="${user.city}"
                                th:data-user-email="${user.email}"
                                th:data-user-phone="${user.phone}">&#9999;&#65039;</button>
                        </td>
                    </tr>
                </table>
            </div>

        </div>
    </div>
</div>

<!-- Модальное окно редактирования -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">Update User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/user/edit}" method="post" id="editUserForm">
                <div class="modal-body">
                    <input type="hidden" name="id" id="editUserIdHidden">
                    <div class="mb-3 text-center">
                        <label class="form-label">ID</label>
                        <input type="text" name="id" id="editId" class="form-control w-50 mx-auto text-center" readonly>
                    </div>

                    <div class="mb-3 text-center">
                        <label class="form-label">Имя</label>
                        <input type="text" name="firstName" id="editFirstName" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Фамилия</label>
                        <input type="text" name="lastName" id="editLastName" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Возраст</label>
                        <input type="number" name="age" id="editAge" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Город</label>
                        <input type="text" name="city" id="editCity" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" id="editEmail" class="form-control w-50 mx-auto text-center">
                    </div>

                    <div class="mb-3 text-center">
                        <label class="form-label">Телефон</label>
                        <input type="tel" name="phone" id="editPhone" class="form-control w-50 mx-auto text-center">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const editModal = document.getElementById('editUserModal')
    if (editModal) {
        editModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;

            // Диагностика
            console.log('=== ДИАГНОСТИКА ===');
            console.log('Кнопка:', button);
            console.log('data-user-id:', button.getAttribute('data-user-id'));
            console.log('data-user-firstname:', button.getAttribute('data-user-firstname'));
            console.log('data-user-lastname:', button.getAttribute('data-user-lastname'));

            document.getElementById('editUserIdHidden').value = button.getAttribute('data-user-id')

            document.getElementById('editId').value = button.getAttribute('data-user-id')
            document.getElementById('editFirstName').value = button.getAttribute('data-user-firstname')
            document.getElementById('editLastName').value = button.getAttribute('data-user-lastname')
            document.getElementById('editAge').value = button.getAttribute('data-user-age')
            document.getElementById('editCity').value = button.getAttribute('data-user-city')
            document.getElementById('editEmail').value = button.getAttribute('data-user-email')
            document.getElementById('editPhone').value = button.getAttribute('data-user-phone')

        })
    }

    <!-- Обработка отправки формы -->
    const editForm = document.getElementById("editUserForm");
    if (editForm) {
        editForm.addEventListener('submit', function(e) {
            e.preventDefault();

            fetch('/user/edit', {
                method:'POST',
                body:new FormData(this)
            })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    } else {
                        return response.json().then(error => {
                            document.querySelectorAll('.error-message').forEach(el => el.remove())
                            for (const [field, message] of Object.entries(error)) {
                                const input = document.querySelector(`[name="${field}"]`)
                                if (input) {
                                    const error = document.createElement('div');
                                    error.className = 'error-message text-danger';
                                    error.textContent = message;
                                    input.parentNode.appendChild(error);
                                }
                            }

                        });
                    }
                });
        });
    }

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

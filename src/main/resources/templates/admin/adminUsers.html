<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      lang="ru">
<head>
    <title>User table</title>
    <link rel="stylesheet" th:href="@{/css/table-form.css}" >
</head>

<body>
<h1 class="centr-style" >Управление пользователями</h1>

<h2>Поиск пользователя</h2>
<form th:action="@{/admin/search}" method="get">
    <input type="number" name="id" placeholder="Введите ID" required>
    <button type="submit">Найти</button>
</form>

<div th:if="${foundUser != null}"style="color: black; margin: 10px 0;">
    <h3>🔍 Результат поиска:</h3>
    <p th:text="'ID: ' + ${foundUser.id}"></p>
    <p th:text="'Имя: ' + ${foundUser.firstName}"></p>
    <p th:text="'Фамилия: ' + ${foundUser.lastName}"></p>
    <p th:text="'Возраст: ' + ${foundUser.age}"></p>
    <p th:text="'Город: ' + ${foundUser.city}"></p>
    <p th:text="'Email: ' + ${foundUser.email}"></p>
    <p th:text="'Телефон: ' + ${foundUser.phone}"></p>
</div>

<div th:if="${error != null}" style="color: red; margin: 10px 0;">
    <strong>❌ Ошибка:</strong> <span th:text="${error}"></span>
</div>

<h2 class="centr-style" >Таблица пользователей</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Возраст</th>
        <th>Город</th>
        <th>Email</th>
        <th>Номер телефона</th>
        <th>Дата создания</th>
        <th>Дата обновления</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.age}"></td>
        <td th:text="${user.city}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.phone}"></td>
        <td th:text="${user.createdAt}"></td>
        <td th:text="${user.updatedAt}"></td>
        <td>
            <form th:action="@{/admin/update/{id}(id=${user.id})}" method="get" style="display:inline;">
                <button type="submit" class="btn-edit">&#9999;&#65039;</button>
            </form>
            <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn-delete"
                        onclick="return confirm('Точно удалить этого пользователя?')">&#128465;</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<h2 class="centr-style">&#10133; Добавить пользователя</h2>
<form th:action="@{/admin/save}" th:object="${user}" method="post" class="user-form">
    <div class="form-group">
        <label>Имя:</label>
        <input type="text"  th:field="${user.firstName}"
               placeholder="Введите имя" required
               minlength="3" maxlength="30">
    </div>

    <div class="form-group">
        <label>Фамилия:</label>
        <input type="text" th:field="${user.lastName}"
               placeholder="Введите фамилию" required
               minlength="2" maxlength="30">
    </div>

    <div class="form-group">
        <label>Возраст:</label>
        <input type="number" th:field="${user.age}"
               placeholder="Введите возраст" required
               min="0" max="130">
    </div>

    <div class="form-group">
        <label>Город:</label>
        <input type="text" th:field="${user.city}"
               placeholder="Введите город" required
               minlength="2" maxlength="50">
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" th:field="${user.email}"
               placeholder="Например: example@mail.com" required>
    </div>

    <div class="form-group">
        <label>Телефон:</label>
        <input type="tel" th:field="${user.phone}"
               placeholder="Например: +79991234567" required
               pattern="^\+?[0-9\-\s]{10,15}$">
    </div>

    <div class="form-group">
        <label>Пароль:</label>
        <input type="password" th:field="${user.password}" required>
    </div>


    <div class="form-actions">
        <button type="submit" class="btn-save"> Сохранить</button>
        <button type="reset" class="btn-reset"> Очистить</button>
    </div>
</form>
<div class="form-actions">
<form th:action="@{/logout}" method="post" style="display: inline;">
    <button type="submit" class="btn-logout">Выйти из аккаунта</button>
</form>
    </div>
</body>
</html>

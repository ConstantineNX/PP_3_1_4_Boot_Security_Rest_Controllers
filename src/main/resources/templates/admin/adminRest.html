<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      lang="ru">
<head>
    <th:block th:include="fragments-bootstrap :: common-head"></th:block>
    <title>User table</title>
    <link rel="stylesheet" th:href="@{/css/table-form.css}">
</head>
<body>
<!-- Верхняя строка для емейл, роли и выхода -->
<nav class="navbar navbar-dark bg-dark py-1">
    <div class="container-fluid">
        <div class="navbar-text text-white">
            <strong id="userEmail">Email</strong>
            <span class="ms-2">with roles:
                <span id="userRoles"></span>
            </span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
</nav>
<!-- Колонка слева для указания текущей роли -->
<div class="container-fluid p-0 mt-3" >
    <div class="row">
        <div class="col-2 p-0">
        <div id="sidebar">
                <ul class="list-unstyled">
                    <li id="adminLink">
                        <button id="adminBtn" onclick="showAdminPanel()" class="d-block; sidebar-btn">Admin</button>
                    <li>
                    <li id="userLink">
                        <button id="userBtn" onclick="showUserPanel()" class="d-block; sidebar-btn">User</button>
                    <li>
                </ul>
        </div>
        </div>
        <div class="col-10 bg-light" style="min-height: 100vh; ">
            <h1 id="pageTitle" style="padding-left: 20px;">Admin panel</h1>

            <!-- Ссылки на вкладки для таблицы и нового пользователя-->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item ms-3">
                    <a id="userTableTab" class="nav-link active" href="#" onclick="showUserTable()">
                        Users table
                    </a>
                </li>
                <li class="nav-item me-3">
                    <a id="addNewUser" class="nav-link" href="#" onclick="showAddNewUserForm()">
                        New User
                    </a>
                </li>
            </ul>
            <!-- Таблица пользователей для админа-->
            <div class="border border-top-0 rounded-bottom" style="background-color: white">
                <div id="adminTableContainer" class="tab-content mt-2">
                        <h3 id="allUsers"  class="ps-3 py-2 bg-light">All Users</h3>
                        <hr class="my-3">
                        <table class="table table-striped table-borderless w-100">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First name</th>
                                <th>Last name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody id="adminTableBody"></tbody>
                        </table>
                </div>

                <!-- Таблица личных данных для отдельного пользователя-->
                <div class="border border-top-0 rounded-bottom">
                    <div id="userTableContainer" class="tab-content mt-1">
                        <h3 id="user"  class="ps-3 py-2 bg-light">About user</h3>
                        <hr class="my-3">
                        <table class="table table-striped table-borderless w-100">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First name</th>
                                <th>Last name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                            </tr>
                            </thead>
                            <tbody id="userTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
                    <!-- Вкладка для добавления нового пользователя -->
                    <div id="saveTable">
                        <h3 class="ps-3 py-2 bg-light">Add new User</h3>
                        <div class="bg-white">
                                <div class="mb-2 text-center">
                                    <label class="form-label">First name:</label>
                                    <input type="text" id="firstName" placeholder="First name" class="form-control w-25 mx-auto">
                                </div>
                                <div class="mb-2 text-center">
                                    <label class="form-label">Last name:</label>
                                    <input type="text" id="lastName" placeholder="Last name" class="form-control w-25 mx-auto">
                                </div>

                                <div class="mb-2 text-center">
                                    <label class="form-label">Age:</label>
                                    <input type="number" id="age" placeholder="age" class="form-control w-25 mx-auto">
                                </div>

                                <div class="mb-2 text-center">
                                    <label class="form-label">Email:</label>
                                    <input type="email" id="email" placeholder="email" class="form-control w-25 mx-auto">
                                </div>

                                <div class="mb-1 text-center">
                                    <label class="form-label">Password:</label>
                                    <input type="password" id="password" placeholder="password" class="form-control w-25 mx-auto"><br>
                                </div>
                                <div class="mb-3 text-center">
                                    <label class="form-label">Role:</label>
                                    <select id="roleId" class="form-control w-25 mx-auto">
                                        <option value= "1">ADMIN</option>
                                        <option value="2" selected>USER</option>
                                    </select>
                                </div>
                                <div class="text-center">
                                    <button type="button" onclick="saveUser()" class="btn btn-success btn-lg mb-3">Add new user</button>
                                </div>
                        </div>
                    </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Модальное окно редактирования -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editUserModalLabel">Update User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="editUserIdHidden">
                    <div class="mb-3 text-center">
                        <label class="form-label">ID</label>
                        <input type="text" id="editId" class="form-control w-50 mx-auto text-center" readonly>
                    </div>

                    <div class="mb-3 text-center">
                        <label class="form-label">First name</label>
                        <input type="text" id="editFirstName" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Last name</label>
                        <input type="text" id="editLastName" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Age</label>
                        <input type="number" id="editAge" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Email</label>
                        <input type="email" id="editEmail" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Password</label>
                        <input type="password" id="editPassword" class="form-control w-50 mx-auto text-center">
                    </div>
                    <div class="mb-3 text-center">
                        <label class="form-label">Role</label>
                        <select id="editRoles" class="form-control w-50 mx-auto text-center">
                            <option value="1">ADMIN</option>
                            <option value="2">USER</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" onclick="updateUser()" class="btn btn-primary">Edit</button>
                </div>
        </div>
    </div>
</div>
    <!-- Модальное окно удаления -->
    <div class="modal fade" id="deleteUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteUserModalLabel">Delete User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="DeleteUserIdHidden">
                        <div class="mb-3 text-center">
                            <label class="form-label">ID</label>
                            <div class="form-control bg-light text-center w-50 mx-auto"
                                 style="line-height: 38px; min-height: 38px"
                                 id="deleteUserId"></div>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">First name</label>
                            <div class="form-control bg-light text-center w-50 mx-auto"
                                 style="line-height: 38px; min-height: 38px"
                                 id="deleteUserFirstName"></div>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Last name</label>
                            <div class="form-control bg-light text-center w-50 mx-auto"
                                 style="line-height: 38px; min-height: 38px"
                                 id="deleteUserLastName"></div>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Age</label>
                            <div class="form-control bg-light text-center w-50 mx-auto"
                                 style="line-height: 38px; min-height: 38px"
                                 id="deleteUserAge"></div>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Email</label>
                            <div class="form-control bg-light text-center w-50 mx-auto"
                                 style="line-height: 38px; min-height: 38px"
                                 id="deleteUserEmail"></div>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label">Role</label>
                            <div class="form-control bg-light text-center w-50 mx-auto"
                                 style="line-height: 38px; min-height: 38px"
                                 id="deleteUserRoles"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" onclick="deleteUser()" class="btn btn-primary">Delete</button>
                    </div>
            </div>
        </div>
    </div>

<!-- Скрипт для оформления страницы и таблицы -->
<script>
// Загрузка данных текущего admin для шапки страницы
function loadUser() {
    fetch('/api/user/profile')
        .then(response => response.json())
        .then(user => {
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userRoles').textContent = Array.from(user.roles).sort().map(role => role.replace('ROLE_', '')).join(' ')

            if (user.roles.includes('ROLE_ADMIN') || user.roles.includes('ADMIN')) {
                showAdminPanel();
            } else {
                document.getElementById('userBtn').style.display = 'block';
                document.getElementById('adminBtn').style.display = 'none';
                document.getElementById('pageTitle').textContent = 'User information-page';
                document.getElementById('userTableContainer').style.display = 'block';
                loadMyProfile();
                setActive('userBtn')
            }
        });
}
//Установка активной кнопки в левом меню (Admin/User)
function setActive(activeId) {
    document.querySelectorAll('.sidebar-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(activeId).classList.add('active');
}
//Установка активной вкладки (usersTable/add new user)
function setActiveTab(activeTab) {
    document.querySelectorAll('.nav-link').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(activeTab).classList.add('active')
}
//Загрузка данных только текущего пользователя
function loadMyProfile() {
    fetch('/api/user/profile')
        .then(response => response.json())
        .then(user => {
            const tbody = document.getElementById('userTableBody')
            tbody.innerHTML =  '';
            let html = '';
            html += `<tr>
                        <td>${user.id}</td>
                        <td>${user.firstName}</td>
                        <td>${user.lastName ?? ''}</td>
                        <td>${user.age ?? ''}</td>
                        <td>${user.email}</td>
                        <td>${Array.from(user.roles).sort().map(role => role.replace('ROLE_', '')).join(' ')}</td>
                    </tr>`
            tbody.innerHTML = html;
        });
}
//Загрузка таблицы пользователей
function loadUsers() {
    fetch('/api/admin/users')
        .then(response => response.json())
        .then(users => {
            const tbody = document.getElementById('adminTableBody')
            tbody.innerHTML = '';
            let html = '';
            users.forEach(user => {
                const sortRole = Array.from(user.roles).sort().map(role => role.replace('ROLE_', '')).join(' ');
                html +=`<tr>
                        <td>${user.id}</td>
                        <td>${user.firstName}</td>
                        <td>${user.lastName ?? ''}</td>
                        <td>${user.age ?? ''}</td>
                        <td>${user.email}</td>
                        <td>${sortRole}</td>
                        <td>
                            <button class="btn btn-sm btn-info text-white" data-bs-toggle="modal"
                                    data-bs-target="#editUserModal"
                                    data-user-id="${user.id}"
                                    data-user-firstName="${user.firstName}"
                                    data-user-lastName="${user.lastName ?? ''}"
                                    data-user-age="${user.age ?? ''}"
                                    data-user-email="${user.email}"
                                    data-user-role-name="${user.roles[0]}">
                                Edit
                            </button></td>
                            <td>
                            <button class="btn btn-sm btn-danger" data-bs-toggle="modal"
                                    data-bs-target="#deleteUserModal"
                                    data-user-id="${user.id}"
                                    data-user-firstName="${user.firstName}"
                                    data-user-lastName="${user.lastName ?? ''}"
                                    data-user-age="${user.age ?? ''}"
                                    data-user-email="${user.email}"
                                    data-user-roles="${sortRole}">
                                Delete
                            </button>
                        </td>
                    </tr>`
            });
            tbody.innerHTML = html;
        })
        .catch(error => console.error('ошибка', error))
}
//Очистка формы нового пользователя
function clearAddUserForm() {
    document.getElementById('firstName').value = '';
    document.getElementById('lastName').value = '';
    document.getElementById('age').value = '';
    document.getElementById('email').value ='';
    document.getElementById('password').value = '';
    document.getElementById('roleId').value = '2';
}

//Загрузка нового пользователя
function saveUser() {
    const user = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        age: document.getElementById('age').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        roleIds: [document.getElementById('roleId').value]
    }

    fetch('/api/admin/users', {
        method: 'POST',
        headers: {'Content-Type' : 'application/json'},
        body: JSON.stringify(user)
    })
        .then(response => {
            if (response.ok) {
                showAdminPanel()
                clearAddUserForm();
            } else {
                return response.json().then(error => {
                    document.querySelectorAll('.error-message').forEach(el => el.remove())
                    for (const [field, message] of Object.entries(error)) {
                        const input = document.getElementById(field)
                        if (input) {
                            const error = document.createElement('div');
                            error.className = 'error-message text-danger';
                            error.textContent = message;
                            input.parentNode.appendChild(error);
                        }
                    }
                });
            }
        });
}

//Включение вкладки Admin
function showAdminPanel() {
    document.getElementById('adminBtn').style.display = 'block';
    document.getElementById('userBtn').style.display = 'block';
    document.getElementById('userTableTab').style.display = 'block';
    document.getElementById('addNewUser').style.display = 'block';
    document.getElementById('adminTableContainer').style.display = 'block';
    document.getElementById('pageTitle').textContent = 'Admin panel';
    document.getElementById('allUsers').style.display = 'block';
    loadUsers();
    showUserTable();
    setActive('adminBtn');
}
//Включение вкладки User
function showUserPanel() {
    setActive('userBtn')
    document.getElementById('adminTableContainer').style.display = 'none';
    document.getElementById('userTableTab').style.display = 'none';
    document.getElementById('addNewUser').style.display = 'none';
    document.getElementById('saveTable').style.display = 'none';
    document.getElementById('pageTitle').textContent = 'User information-page';
    document.getElementById('userTableContainer').style.display = 'block';
    loadMyProfile();
}

//Включение активной вкладки таблица пользователей
function showUserTable() {
    setActiveTab('userTableTab')
    document.getElementById('adminTableContainer').style.display = 'block';
    document.getElementById('userTableContainer').style.display = 'none';
    document.getElementById('saveTable').style.display = 'none'
}
//Включение активной вкладки новый пользователь
function showAddNewUserForm() {
    setActiveTab('addNewUser')
    document.getElementById('adminTableContainer').style.display = 'none';
    document.getElementById('userTableContainer').style.display = 'none';
    document.getElementById('saveTable').style.display = 'block';
}
loadUser();
</script>

<!-- Скрипт для модального окна удаления -->
<script>
    const deleteModal = document.getElementById('deleteUserModal')
    if (deleteModal) {
        deleteModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            document.getElementById('DeleteUserIdHidden').value = button.getAttribute('data-user-id')
            document.getElementById('deleteUserId').textContent = button.getAttribute('data-user-id')
            document.getElementById('deleteUserFirstName').textContent = button.getAttribute('data-user-firstname')
            document.getElementById('deleteUserLastName').textContent = button.getAttribute('data-user-lastname')
            document.getElementById('deleteUserAge').textContent = button.getAttribute('data-user-age')
            document.getElementById('deleteUserEmail').textContent = button.getAttribute('data-user-email')
            document.getElementById('deleteUserRoles').textContent = button.getAttribute('data-user-roles')
        })
    }
// Функция удаления пользователя
function deleteUser() {
        const userId = document.getElementById('DeleteUserIdHidden').value;
        fetch('/api/admin/users/' + userId, {
        method: 'DELETE',
        headers: {'Content-Type' :'application/json'},
    })
            .then(response => {
               if (response.ok) {
                   loadUsers();
                   document.querySelector('#deleteUserModal .btn-secondary').click();
               }
            });
}
</script>
<!-- Скрипт для обновления -->
<script>
    const editModal = document.getElementById('editUserModal')
    if (editModal) {
        editModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            console.log('roleId from button:', button.getAttribute('data-user-role-id'));

            document.getElementById('editUserIdHidden').value = button.getAttribute('data-user-id');
            document.getElementById('editId').value = button.getAttribute('data-user-id');
            document.getElementById('editFirstName').value = button.getAttribute('data-user-firstname');
            document.getElementById('editLastName').value = button.getAttribute('data-user-lastname');
            document.getElementById('editAge').value = button.getAttribute('data-user-age');
            document.getElementById('editEmail').value = button.getAttribute('data-user-email');
            document.getElementById('editPassword').value = '';
            const editRoles = document.getElementById('editRoles');
            if (editRoles) {
            const roleName = button.getAttribute('data-user-role-name');
                if (roleName === 'ADMIN') {
                    editRoles.value = '1';
                } else if (roleName === 'USER') {
                    editRoles.value = '2';
                }
            }
        });
    }
    // Обработка отправки формы
    function updateUser() {
        const userId = document.getElementById('editUserIdHidden').value;
        const user = {
            firstName: document.getElementById('editFirstName').value,
            lastName: document.getElementById('editLastName').value,
            age: document.getElementById('editAge').value,
            email: document.getElementById('editEmail').value,
            password: document.getElementById('editPassword').value || null,
            roleIds: [document.getElementById('editRoles').value]
        };
        console.log('editRoles value:', document.getElementById('editRoles').value);
        console.log('roleIds:', [document.getElementById('editRoles').value]);
        fetch('/api/admin/users/' + userId, {
            method:'PUT',
            headers: {'Content-Type' : 'application/json'},
            body: JSON.stringify(user)
        })
            .then(response => {
                if (response.ok) {
                    loadMyProfile();
                    loadUsers();
                    document.querySelector('#editUserModal .btn-secondary').click();
                } else {
                    return response.json().then(error => {
                        document.querySelectorAll('.error-message').forEach(el => el.remove())
                        for (const [field, message] of Object.entries(error)) {
                            const input = document.getElementById(`edit${field.charAt(0).toUpperCase()}${field.slice(1)}`)
                            if (input) {
                                const error = document.createElement('div');
                                error.className = 'error-message text-danger';
                                error.textContent = message;
                                input.parentNode.appendChild(error);
                            }
                        }
                    });
                }
            });
    }
</script>
</body>
</html>
